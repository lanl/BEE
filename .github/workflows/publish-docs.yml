name: Publish Docs

on:
  push:
    branches:
      - main
    tags:
      - '*dev*'  # Match x.x.xxdevx style tags

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:

  # 1. MAIN BRANCH DEPLOYMENT (Production)
  publish-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: BEE Install and Build Docs
        env:
          DOCS_VERSION: main
        run: ./ci/docs.sh

      - name: Deploy main docs to gh-pages root
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git clone --depth=1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages

          find gh-pages -mindepth 1 -maxdepth 1 ! -name ".git" ! -name ".nojekyll" -exec rm -rf {} +

          cp -r docs/sphinx/_build/html/* gh-pages/
          touch gh-pages/.nojekyll

          cd gh-pages
          git add .

          if git diff --cached --quiet; then
            echo "No docs changes to deploy"
          else
            git commit -m "Deploy main docs"
            git push origin gh-pages
          fi

  # 2. TAGGED DEV RELEASE DEPLOYMENT
  publish-dev-tag:
    if: startsWith(github.ref, 'refs/tags/') && contains(github.ref, 'dev')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure tags are available

      - name: Get Tag Name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Docs
        run: ./ci/docs.sh

      - name: Deploy versioned dev docs to subdir
        run: |
          TAG_NAME=${{ steps.tag.outputs.TAG_NAME }}

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git clone --depth=1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
          cd gh-pages

          mkdir -p $TAG_NAME
          rm -rf $TAG_NAME/*
          cp -r ../docs/sphinx/_build/html/* $TAG_NAME/

          touch .nojekyll
          git add .

          if git diff --cached --quiet; then
            echo "No docs changes to deploy for $TAG_NAME"
          else
            git commit -m "Deploy docs for $TAG_NAME"
            git push origin gh-pages
          fi

